name: Check Regulations

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Check for new regulations
        run: python scrapers/scrape_regulations.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/fuel_params.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: update regulation reference $(date -u +%Y-%m-%d)"
            git push
          fi
